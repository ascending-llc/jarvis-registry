site_name: Jarvis Registry
site_description: Connect any AI copilot to your enterprise tools through a single gateway with built-in security, auto-discovery, and full observability.
site_author: ASCENDING Inc
site_url: https://ascending-llc.github.io/jarvis-registry/
# Repository
repo_name: ascending-llc/jarvis-registry
repo_url: https://github.com/ascending-llc/jarvis-registry

# Copyright
copyright: Copyright &copy; 2025-Present ASCENDING Inc

# Configuration
theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.code.annotate
  logo: img/jarvis_vertical_logo_w_text_light_bkg.svg
  favicon: img/favicon-64x64.png

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Plugins
plugins:
  - search:
      lang: en
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: ascending-llc
      repo: jarvis-registry
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - Jarvis Registry: index.md
  - Why use Registry: FEATURES.md
  - Get Started:
    - Quick Start: quick-start.md
    - Installation: installation.md
    - Configuration: configuration.md
  - Authentication:
    - Authentication Guide: auth.md
    - Keycloak Integration: keycloak-integration.md
    - Amazon Cognito: cognito.md
    - Microsoft Entra ID: entra-id-setup.md
  - Core Design:
    - Security Control Design: design/security-design.md
    - RBAC & Scopes: design/scopes.md
    - ACL Connector Service: design/acl-connector-service.md
    - A2A Agent API: design/a2a-agent-api-design.md
    - Agent Workflow: design/agent-workflow.md
    - AgentCore Integration: design/agentcore.md
    - Federation Guide: design/federation.md
    - Federation API: design/federation-api.md
    - DB Persistence: design/mcp_db_persistence_design.md
  - Project:
    - Contributing: CONTRIBUTING.md
    - License: LICENSE.md
    - Code of Conduct: CODE_OF_CONDUCT.md
    - Notice: NOTICE.md

# Extra
extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://ascendingdc.com/jarvis-ai/
      name: Jarvis AI by ASCENDING Inc
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/channel/UCi5_sn38igXkk-4hsR0JGtw
      name: ASCENDING Inc on YouTube
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/ascendingllc/mycompany/
      name: ASCENDING Inc on LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/ascending-llc/jarvis-registry
      name: GitHub Repository
  generator: false

