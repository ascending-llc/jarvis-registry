receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # Debug: Prints logs to the collector's console output (docker logs otel-collector)
  debug:
    verbosity: detailed

  # Optional: Forward metrics to Prometheus
  prometheus:
    endpoint: "0.0.0.0:8889"

  # Receives gen_ai.* spans from agents/Claude Code.
  otlphttp/langfuse:
    endpoint: https://us.cloud.langfuse.com/api/public/otel
    headers:
      Authorization: "Basic ${env:LANGFUSE_OTLP_AUTHORIZATION}"

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: 
        - debug 
        - otlphttp/langfuse
