name: Release Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          # Need a token that can push back to main (PAT or default GITHUB_TOKEN
          # with write permissions — granted above via permissions: contents: write)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyYAML

      - name: Generate changelog page and update nav
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          PRERELEASE: ${{ github.event.release.prerelease }}
        run: python .github/workflows/utils/update_changelog.py

      - name: Commit and push changelog updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/changelog/ mkdocs.yml
          git diff --cached --quiet || git commit -m "docs: add changelog for ${{ github.event.release.tag_name }}"
          git push origin main
