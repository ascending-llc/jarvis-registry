name: Release Changelog

# Manually triggered after the "Create GitHub Release" workflow finishes.
# Accepts an optional release tag; when omitted, the latest published release
# (excluding drafts) is used.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to generate changelog for (e.g. asc1.2.3). Leave blank to use the latest release.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          # Need a token that can push back to main (PAT or default GITHUB_TOKEN
          # with write permissions — granted above via permissions: contents: write)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release metadata
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG=$(gh release list \
              --exclude-drafts \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName' \
              2>/dev/null || echo "")
          fi
          if [ -z "$TAG" ]; then
            echo "❌ Could not determine a release tag. Pass release_tag explicitly or create a release first." >&2
            exit 1
          fi
          echo "📋 Using release tag: $TAG"

          # Fetch release metadata as JSON and expose each field via GITHUB_OUTPUT.
          # Use heredoc-style multiline outputs so bodies with newlines pass through cleanly.
          RELEASE_JSON=$(gh release view "$TAG" --json tagName,body,publishedAt,url,isPrerelease)

          {
            echo "tag=$(echo "$RELEASE_JSON" | jq -r '.tagName')"
            echo "date=$(echo "$RELEASE_JSON" | jq -r '.publishedAt')"
            echo "url=$(echo "$RELEASE_JSON" | jq -r '.url')"
            echo "prerelease=$(echo "$RELEASE_JSON" | jq -r '.isPrerelease')"
            echo "body<<__RELEASE_BODY_EOF__"
            echo "$RELEASE_JSON" | jq -r '.body'
            echo "__RELEASE_BODY_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog page and update nav
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
          RELEASE_DATE: ${{ steps.release.outputs.date }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: python .github/workflows/utils/update_changelog.py

      - name: Commit changelog updates to a branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/changelog/ mkdocs.yml
          if git diff --cached --quiet; then
            echo "ℹ️  No changelog changes to commit — skipping PR creation."
            exit 0
          fi

          BRANCH="docs/changelog-${RELEASE_TAG}"
          # If a stale branch from a previous run exists, replace it. This branch
          # is fully owned/regenerated by this workflow on every run, so a plain
          # force-push is safe — --force-with-lease would reject the push as
          # "stale info" whenever this checkout has never fetched the branch's
          # current remote state (e.g. it was recreated by an earlier run).
          git checkout -b "$BRANCH"
          git commit -m "docs: add changelog for ${RELEASE_TAG}"
          git push --force origin "$BRANCH"

          # `gh pr view` matches by head branch regardless of state, so a closed
          # PR looks identical to an open one unless we check state explicitly.
          # Reuse an open PR if present; otherwise open a new one (this also
          # covers the case where a prior PR for this branch was closed).
          EXISTING_PR_STATE=$(gh pr view "$BRANCH" --json state --jq '.state' 2>/dev/null || echo "")

          if [ "$EXISTING_PR_STATE" = "OPEN" ]; then
            PR_URL=$(gh pr view "$BRANCH" --json url --jq '.url')
            echo "ℹ️  PR already open for ${BRANCH}: ${PR_URL}"
          else
            PR_BODY_FILE=$(mktemp)
            cat > "$PR_BODY_FILE" <<EOF
          Automated changelog update for [${RELEASE_TAG}](${RELEASE_URL}).

          Generated by the Release Changelog workflow. Review and approve to publish the changelog page.
          EOF
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "docs: add changelog for ${RELEASE_TAG}" \
              --body-file "$PR_BODY_FILE"
            rm -f "$PR_BODY_FILE"
          fi
