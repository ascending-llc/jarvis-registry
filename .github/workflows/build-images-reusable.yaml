name: Build and Push Docker Images (Reusable)

on:
  workflow_call:
    inputs:
      git_ref:
        description: 'Git ref to checkout (commit SHA, tag, or branch)'
        type: string
        required: false
        default: ''
      version_tag:
        description: 'Optional version tag for images'
        type: string
        required: false
        default: ''
      tag_as_latest:
        description: 'Also push the :latest tag (used for main branch deploys)'
        type: boolean
        required: false
        default: false
    secrets:
      JARVIS_RELEASE_ACCESS_TOKEN:
        required: true

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  prepare-artifacts:
    runs-on: ubuntu-latest
    outputs:
      schema_version: ${{ steps.schema.outputs.schema-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get latest schema version
        id: schema
        uses: ./.github/actions/get-schema-version
        with:
          github-token: ${{ secrets.JARVIS_RELEASE_ACCESS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Build artifacts
        run: uv run poe build-artifacts

      - name: Display artifacts
        run: ls -al build-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-and-locks
          path: build-artifacts/
          retention-days: 1

  build-and-push-registry:
    needs: prepare-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref || github.sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine BUILD_VERSION
        id: version
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            echo "version=${{ inputs.version_tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          fi

      - name: Determine image tags
        id: tags
        run: |
          GHCR_BASE="ghcr.io/${{ github.repository_owner }}/jarvis/registry"
          GHCR_COMMIT_TAG="${GHCR_BASE}:${{ github.sha }}"
          GHCR_LATEST_TAG="${GHCR_BASE}:latest"

          if [ -n "${{ inputs.version_tag }}" ]; then
            GHCR_VERSION_TAG="${GHCR_BASE}:${{ inputs.version_tag }}"
            echo "tags=${GHCR_VERSION_TAG},${GHCR_LATEST_TAG},${GHCR_COMMIT_TAG}" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.tag_as_latest }}" = "true" ]; then
            echo "tags=${GHCR_LATEST_TAG},${GHCR_COMMIT_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tags=${GHCR_COMMIT_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Download build artifact - wheels and locks
        uses: actions/download-artifact@v8
        with:
          name: wheels-and-locks
          path: build-artifacts/

      - name: Display artifacts
        run: ls -al build-artifacts

      - name: Build and push mcp-gateway registry image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          context: .
          file: docker/Dockerfile.registry
          build-args: |
            TOOL_DISCOVERY_MODE=external
            BUILD_VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false

      - name: Guard the Docker image against import exceptions
        run: >
          docker run --rm --entrypoint='' -e BUILD_VERSION=dummy
          -e SECRET_KEY=dummy -e ADMIN_PASSWORD=dummy -e ADMIN_USER=dummy
          "ghcr.io/${{ github.repository_owner }}/jarvis/registry:${{ github.sha }}"
          python -c "from registry.main import app; print(type(app))"

  build-and-push-registry-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref || github.sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          GHCR_BASE="ghcr.io/${{ github.repository_owner }}/jarvis/registry-frontend"
          GHCR_COMMIT_TAG="${GHCR_BASE}:${{ github.sha }}"
          GHCR_LATEST_TAG="${GHCR_BASE}:latest"

          if [ -n "${{ inputs.version_tag }}" ]; then
            GHCR_VERSION_TAG="${GHCR_BASE}:${{ inputs.version_tag }}"
            echo "tags=${GHCR_VERSION_TAG},${GHCR_LATEST_TAG},${GHCR_COMMIT_TAG}" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.tag_as_latest }}" = "true" ]; then
            echo "tags=${GHCR_LATEST_TAG},${GHCR_COMMIT_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tags=${GHCR_COMMIT_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push mcp-gateway registry frontend image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          context: .
          file: docker/Dockerfile.registry-frontend
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false

  build-and-push-auth-server:
    needs: prepare-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref || github.sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          GHCR_BASE="ghcr.io/${{ github.repository_owner }}/jarvis/auth-server"
          GHCR_COMMIT_TAG="${GHCR_BASE}:${{ github.sha }}"
          GHCR_LATEST_TAG="${GHCR_BASE}:latest"

          if [ -n "${{ inputs.version_tag }}" ]; then
            GHCR_VERSION_TAG="${GHCR_BASE}:${{ inputs.version_tag }}"
            echo "tags=${GHCR_VERSION_TAG},${GHCR_LATEST_TAG},${GHCR_COMMIT_TAG}" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.tag_as_latest }}" = "true" ]; then
            echo "tags=${GHCR_LATEST_TAG},${GHCR_COMMIT_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tags=${GHCR_COMMIT_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Download build artifact - wheels and locks
        uses: actions/download-artifact@v8
        with:
          name: wheels-and-locks
          path: build-artifacts/

      - name: Display artifacts
        run: ls -al build-artifacts

      - name: Build and push mcp-gateway auth-server image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          context: .
          file: docker/Dockerfile.auth
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false

      - name: Guard the Docker image against import exceptions
        run: >
          docker run --rm --entrypoint=''
          "ghcr.io/${{ github.repository_owner }}/jarvis/auth-server:${{ github.sha }}"
          python -c "from auth_server.server import app; print(type(app))"
