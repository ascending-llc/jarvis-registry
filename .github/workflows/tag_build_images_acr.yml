name: Build and Push Docker Images to ACR
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Existing version tag to push (e.g., asc1.2.3); leave empty to use latest asc* tag'
        type: string
        required: false
        default: ''
permissions:
  id-token: write
  contents: read
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve version tag and commit
      id: version
      env:
        INPUT_VERSION_TAG: ${{ inputs.version_tag }}
      run: |
        if [ -n "$INPUT_VERSION_TAG" ]; then
          TARGET_TAG="$INPUT_VERSION_TAG"
          if ! [[ "$TARGET_TAG" =~ ^asc[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version_tag must match ascX.Y.Z (for example: asc0.4.6)."
            exit 1
          fi
        else
          TARGET_TAG="$(git describe --tags --abbrev=0 --match "asc*" 2>/dev/null || true)"
        fi

        if [ -z "$TARGET_TAG" ]; then
          echo "No asc* tag found and no version_tag input provided."
          exit 1
        fi

        if ! git show-ref --verify --quiet "refs/tags/$TARGET_TAG"; then
          echo "Tag '$TARGET_TAG' does not exist in this repository."
          exit 1
        fi

        TARGET_SHA="$(git rev-list -n 1 "$TARGET_TAG")"

        echo "version_tag=$TARGET_TAG" >> $GITHUB_OUTPUT
        echo "commit_sha=$TARGET_SHA" >> $GITHUB_OUTPUT
        echo "Resolved version tag: $TARGET_TAG"
        echo "Tag commit sha: $TARGET_SHA"

    - name: Checkout resolved tag
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.version.outputs.version_tag }}
        fetch-depth: 0

    - name: Get latest schema version
      id: schema
      uses: ./.github/actions/get-schema-version
      with:
        github-token: ${{ secrets.JARVIS_RELEASE_ACCESS_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Generate registry-pkgs model code from schemas
      run: >
        uv run --package registry-pkgs import-schemas
        --tag "${{ steps.schema.outputs.schema-version }}"
        --output-dir ./registry-pkgs/src/registry_pkgs/models
        --token "${{ secrets.JARVIS_RELEASE_ACCESS_TOKEN }}"

    - name: Build artifacts
      run: uv run poe build-artifacts

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Azure login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Login to Azure Container Registry
      id: login-acr
      run: |
        az acr login --name "${{ secrets.AZURE_ACR_NAME }}"
        echo "registry=${{ secrets.AZURE_ACR_NAME }}.azurecr.io" >> $GITHUB_OUTPUT

    - name: Determine image tags
      id: tags
      run: |
        REGISTRY="${{ steps.login-acr.outputs.registry }}"
        VERSION="${{ steps.version.outputs.version_tag }}"
        SHA="${{ steps.version.outputs.commit_sha }}"

        echo "registry_tags=${REGISTRY}/jarvis/registry:${VERSION},${REGISTRY}/jarvis/registry:${SHA}" >> $GITHUB_OUTPUT
        echo "auth_tags=${REGISTRY}/jarvis/auth-server:${VERSION},${REGISTRY}/jarvis/auth-server:${SHA}" >> $GITHUB_OUTPUT
        echo "frontend_tags=${REGISTRY}/jarvis/registry-frontend:${VERSION},${REGISTRY}/jarvis/registry-frontend:${SHA}" >> $GITHUB_OUTPUT

    - name: Build and push registry image
      uses: docker/build-push-action@v6
      with:
        platforms: linux/amd64
        context: .
        file: docker/Dockerfile.registry
        build-args: |
          TOOL_DISCOVERY_MODE=external
          BUILD_VERSION=${{ steps.version.outputs.version_tag }}
        push: true
        tags: ${{ steps.tags.outputs.registry_tags }}
        provenance: false

    - name: Guard registry image against import exceptions
      run: >
        docker run --rm --entrypoint='' -e BUILD_VERSION=dummy
        -e SECRET_KEY=dummy -e ADMIN_PASSWORD=dummy -e ADMIN_USER=dummy
        "${{ steps.login-acr.outputs.registry }}/jarvis/registry:${{ steps.version.outputs.commit_sha }}"
        python -c "from registry.main import app; print(type(app))"

    - name: Build and push auth-server image
      uses: docker/build-push-action@v6
      with:
        platforms: linux/amd64
        context: .
        file: docker/Dockerfile.auth
        push: true
        tags: ${{ steps.tags.outputs.auth_tags }}
        provenance: false

    - name: Guard auth-server image against import exceptions
      run: >
        docker run --rm --entrypoint=''
        "${{ steps.login-acr.outputs.registry }}/jarvis/auth-server:${{ steps.version.outputs.commit_sha }}"
        python -c "from auth_server.server import app; print(type(app))"

    - name: Build and push registry-frontend image
      uses: docker/build-push-action@v6
      with:
        platforms: linux/amd64
        context: .
        file: docker/Dockerfile.registry-frontend
        push: true
        tags: ${{ steps.tags.outputs.frontend_tags }}
        provenance: false
