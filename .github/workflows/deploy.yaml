name: Registry Deployment Pipeline
on:
  workflow_dispatch:
    inputs:
      application:
        description: 'Application to deploy to'
        type: choice
        required: true
        default: jarvis-demo
        options:
          - jarvis
          - jarvis-demo
      region:
        description: 'AWS Region to deploy to'
        type: string
        required: true
        default: us-east-1



run-name: Deploy Registry for ${{ inputs.application }}

permissions:
  id-token: write
  contents: read
  packages: write
jobs:
  refresh_secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9

      - name: Install Python dependencies
        run: |
          pip install boto3 PyYAML pymongo python-dotenv

      - name: Load Application Configuration
        id: config
        run: |
          CONFIG=$(cat .github/workflows/config/applications.json | jq -r --arg app "${{ inputs.application }}" '.[$app]')
          echo "eks_cluster_name=$(echo $CONFIG | jq -r '.eks_cluster_name')" >> $GITHUB_OUTPUT
          echo "aws_deploy_role=$(echo $CONFIG | jq -r '.aws_deploy_role')" >> $GITHUB_OUTPUT
          echo "secret_name=$(echo $CONFIG | jq -r '.secret_name')" >> $GITHUB_OUTPUT

      - name: Set IAM role to assume
        id: set-role
        run: |
          echo "role=${{ secrets[steps.config.outputs.aws_deploy_role] }}" >> $GITHUB_OUTPUT

      - name: Assume IAM role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.set-role.outputs.role }}
          role-session-name: deployment-role-session
          aws-region: ${{ inputs.region }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ steps.config.outputs.eks_cluster_name }} --region ${{ inputs.region }}

      - name: Sync registry env variables
        env:
          AWS_REGION: ${{ inputs.region }}
          SECRET_NAME: ${{ steps.config.outputs.secret_name }}
        run: |
          echo "Generating new registry env YAML..."
          python .github/workflows/utils/generate_k8s_registry_env.py

          echo "Applying new env vars..."
          kubectl apply -f kubernetes/registry_env_externalsecret.yaml -n ${{ inputs.application  }}

          echo "Updating env vars in EKS pods..."
          kubectl annotate es registry-env force-sync=$(date +%s) --overwrite -n ${{ inputs.application  }}

      - name: Seed AccessRoles Database
        env:
          AWS_REGION: ${{ inputs.region }}
          SECRET_NAME: ${{ steps.config.outputs.secret_name }}
        run: |
          echo "Fetching MongoDB credentials from AWS Secrets Manager..."
          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $SECRET_NAME --region $AWS_REGION --query SecretString --output text)
          
          ORIGINAL_MONGO_URI=$(echo $SECRET_JSON | python3 -c "import sys, json; print(json.load(sys.stdin).get('MONGO_URI', ''))")
          export MONGODB_USERNAME=$(echo $SECRET_JSON | python3 -c "import sys, json; print(json.load(sys.stdin).get('MONGODB_USERNAME', ''))")
          export MONGODB_PASSWORD=$(echo $SECRET_JSON | python3 -c "import sys, json; print(json.load(sys.stdin).get('MONGODB_PASSWORD', ''))")
          
          if [ -z "$ORIGINAL_MONGO_URI" ]; then
            echo "ERROR: MONGO_URI not found in AWS Secrets Manager!"
            exit 1
          fi
          
          echo "Original MONGO_URI: ${ORIGINAL_MONGO_URI}"
          
          # Start kubectl port-forward in background
          echo "Setting up port-forward to MongoDB service..."
          kubectl port-forward -n ${{ inputs.application }} svc/mongodb-svc 27017:27017 &
          PORT_FORWARD_PID=$!
          
          # Wait for port-forward to be ready
          sleep 5
          
          # Replace mongodb-svc with localhost for local access
          export MONGO_URI=$(echo "$ORIGINAL_MONGO_URI" | sed 's/mongodb-svc/localhost/g')
          echo "Modified MONGO_URI for local access (length: ${#MONGO_URI})"
          
          # Run seed script
          echo "Seeding AccessRoles collection..."
          python scripts/seed_access_roles_standalone.py
          
          # Cleanup port-forward
          kill $PORT_FORWARD_PID 2>/dev/null || true

  build-images:
    uses: ./.github/workflows/build-images-reusable.yaml
    needs: refresh_secrets
    with:
      tag_as_latest: ${{ github.ref == 'refs/heads/main' }}
    secrets:
      JARVIS_RELEASE_ACCESS_TOKEN: ${{ secrets.JARVIS_RELEASE_ACCESS_TOKEN }}

  deploy-registry:
    runs-on: ubuntu-latest
    needs: build-images
    env:
      DEPLOYMENT_NAME: registry-backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Load Application Configuration
        id: config
        run: |
          CONFIG=$(cat .github/workflows/config/applications.json | jq -r --arg app "${{ inputs.application }}" '.[$app]')
          echo "eks_cluster_name=$(echo $CONFIG | jq -r '.eks_cluster_name')" >> $GITHUB_OUTPUT
          echo "aws_deploy_role=$(echo $CONFIG | jq -r '.aws_deploy_role')" >> $GITHUB_OUTPUT

      - name: Set IAM role to assume
        id: set-role
        run: |
          echo "role=${{ secrets[steps.config.outputs.aws_deploy_role] }}" >> $GITHUB_OUTPUT

      - name: Assume IAM role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.set-role.outputs.role }}
          role-session-name: deployment-role-session
          aws-region: ${{ inputs.region }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ steps.config.outputs.eks_cluster_name }} --region ${{ inputs.region }}

      - name: Update backend images on EKS
        env:
          image: ghcr.io/${{ github.repository_owner }}/jarvis/registry:${{ github.sha }}
        run: |
          kubectl set image deploy/${{ env.DEPLOYMENT_NAME }} registry-backend=$image -n ${{ inputs.application  }}

      - name: Check pod status
        run: |
          kubectl rollout status deploy/${{ env.DEPLOYMENT_NAME }} -n ${{ inputs.application  }}

  deploy-registry-frontend:
    runs-on: ubuntu-latest
    needs: build-images
    env:
      DEPLOYMENT_NAME: registry-frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Load Application Configuration
        id: config
        run: |
          CONFIG=$(cat .github/workflows/config/applications.json | jq -r --arg app "${{ inputs.application }}" '.[$app]')
          echo "eks_cluster_name=$(echo $CONFIG | jq -r '.eks_cluster_name')" >> $GITHUB_OUTPUT
          echo "aws_deploy_role=$(echo $CONFIG | jq -r '.aws_deploy_role')" >> $GITHUB_OUTPUT

      - name: Set IAM role to assume
        id: set-role
        run: |
          echo "role=${{ secrets[steps.config.outputs.aws_deploy_role] }}" >> $GITHUB_OUTPUT

      - name: Assume IAM role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.set-role.outputs.role }}
          role-session-name: deployment-role-session
          aws-region: ${{ inputs.region }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ steps.config.outputs.eks_cluster_name }} --region ${{ inputs.region }}

      - name: Update backend images on EKS
        env:
          image: ghcr.io/${{ github.repository_owner }}/jarvis/registry-frontend:${{ github.sha }}
        run: |
          kubectl set image deploy/${{ env.DEPLOYMENT_NAME }} registry-frontend=$image -n ${{ inputs.application  }}

      - name: Check pod status
        run: |
          kubectl rollout status deploy/${{ env.DEPLOYMENT_NAME }} -n ${{ inputs.application  }}

  deploy-auth-server:
    runs-on: ubuntu-latest
    needs: build-images
    env:
      DEPLOYMENT_NAME: auth-server
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Load Application Configuration
        id: config
        run: |
          CONFIG=$(cat .github/workflows/config/applications.json | jq -r --arg app "${{ inputs.application }}" '.[$app]')
          echo "eks_cluster_name=$(echo $CONFIG | jq -r '.eks_cluster_name')" >> $GITHUB_OUTPUT
          echo "aws_deploy_role=$(echo $CONFIG | jq -r '.aws_deploy_role')" >> $GITHUB_OUTPUT

      - name: Set IAM role to assume
        id: set-role
        run: |
          echo "role=${{ secrets[steps.config.outputs.aws_deploy_role] }}" >> $GITHUB_OUTPUT

      - name: Assume IAM role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.set-role.outputs.role }}
          role-session-name: deployment-role-session
          aws-region: ${{ inputs.region }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ steps.config.outputs.eks_cluster_name }} --region ${{ inputs.region }}

      - name: Update backend images on EKS
        env:
          image: ghcr.io/${{ github.repository_owner }}/jarvis/auth-server:${{ github.sha }}
        run: |
          kubectl set image deploy/${{ env.DEPLOYMENT_NAME }} auth-server=$image -n ${{ inputs.application  }}

      - name: Check pod status
        run: |
          kubectl rollout status deploy/${{ env.DEPLOYMENT_NAME }} -n ${{ inputs.application  }}
